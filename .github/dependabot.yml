version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    ignore:
      - dependency-name: "next"
        versions: [">=16.2.0"]
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - "typescript-eslint"
      sentry:
        patterns:
          - "@sentry/*"
      supabase:
        patterns:
          - "supabase"
          - "@supabase/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
