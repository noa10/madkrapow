version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - "typescript-eslint"
      sentry:
        patterns:
          - "@sentry/*"
      supabase:
        patterns:
          - "supabase"
          - "@supabase/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
