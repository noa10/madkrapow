name: Android CI

on:
  push:
    branches: [master]
    paths:
      - 'apps/mobile/**'
      - 'apps/merchant/**'
      - 'packages/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'apps/mobile/**'
      - 'apps/merchant/**'
      - 'packages/**'
      - '.github/workflows/android-ci.yml'

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.41.9
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: temurin

jobs:
  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/03d0035246f3e81f36aed592ffb4bebf33a03106/scripts/download-actionlint.bash) 1.7.7
        shell: bash
      - name: Run actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color .github/workflows/android-ci.yml .github/workflows/android-release.yml
        shell: bash

  gitignore-guard:
    name: Verify keystore gitignore coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify patterns present
        shell: bash
        run: |
          set -euo pipefail
          for app in mobile merchant; do
            gi="apps/${app}/android/.gitignore"
            for pat in 'key.properties' '**/*.keystore' '**/*.jks'; do
              if ! grep -qxF "$pat" "$gi"; then
                echo "::error file=${gi}::missing required gitignore line: ${pat}"
                exit 1
              fi
            done
          done

  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'
              - '.github/workflows/android-ci.yml'
            merchant:
              - 'apps/merchant/**'
              - 'packages/**'
              - '.github/workflows/android-ci.yml'

  build:
    name: build (${{ matrix.app }})
    needs: [changes, actionlint, gitignore-guard]
    if: needs.changes.outputs.apps != '[]' && needs.changes.outputs.apps != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ matrix.app }}-${{ hashFiles(format('apps/{0}/pubspec.lock', matrix.app)) }}
          restore-keys: |
            pub-${{ runner.os }}-${{ matrix.app }}-

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.app }}-${{ hashFiles(format('apps/{0}/android/**/*.gradle*', matrix.app), format('apps/{0}/android/**/gradle-wrapper.properties', matrix.app)) }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ matrix.app }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env for code generation
        run: cp .env.example .env

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android debug APK (smoke)
        run: flutter build apk --debug
