name: HubboPOS Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger HubboPOS Sync
        run: |
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${NEXT_PUBLIC_URL}/api/cron/hubbopos/sync" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")

          echo "Response status: $HTTP_STATUS"
          cat response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "HubboPOS sync failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "HubboPOS sync completed successfully"
        env:
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
