name: Mobile CI

on:
  push:
    branches: [master]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-types/**'
  pull_request:
    branches: [master]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-types/**'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
